<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:  #0d1b2e;
    --navy2: #081220;
    --red:   #cc1e2b;
    --white: #ffffff;
    --gray:  #d0d4da;
    --muted: rgba(255,255,255,.4);
    --gold:  #e8a020;
    --border: rgba(255,255,255,.1);
  }
  html, body {
    height: 100%;
    background: var(--navy2);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(204,30,43,.1) 0%, transparent 65%);
    pointer-events: none;
  }

  /* ── Hamburger ── */
  .nav-btn {
    position: fixed;
    top: 22px; left: 22px;
    z-index: 1000;
    background: rgba(255,255,255,.07);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 44px; height: 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    cursor: pointer;
    transition: background .2s;
  }
  .nav-btn:hover { background: rgba(255,255,255,.13); }
  .nav-btn span {
    display: block;
    width: 20px; height: 2px;
    background: var(--white);
    border-radius: 2px;
    transition: all .25s cubic-bezier(.4,0,.2,1);
  }
  .nav-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .nav-btn.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .nav-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* ── Sidebar ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 998;
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .sidebar {
    position: fixed;
    top: 0; left: 0;
    width: 270px; height: 100%;
    background: #070f1a;
    border-right: 1px solid var(--border);
    z-index: 999;
    transform: translateX(-100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    display: flex;
    flex-direction: column;
    padding-bottom: 24px;
    overflow-y: auto;
  }
  .sidebar.open { transform: translateX(0); }

  .sb-head {
    padding: 20px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }
  .sb-head img {
    width: 38px; height: 38px;
    border-radius: 8px;
    flex-shrink: 0;
  }
  .sb-head-text .t {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .sb-head-text .s {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: .07em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .sb-section { padding: 10px 14px 2px; }
  .sb-label {
    font-size: 8.5px;
    font-weight: 700;
    letter-spacing: .13em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 6px;
    margin-bottom: 3px;
  }
  .sb-link {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    border-radius: 6px;
    text-decoration: none;
    color: var(--gray);
    font-size: 13px;
    font-weight: 500;
    transition: background .15s, color .15s;
    margin-bottom: 1px;
  }
  .sb-link:hover { background: rgba(255,255,255,.07); color: var(--white); }
  .sb-link .ic { font-size: 14px; width: 18px; text-align: center; }
  .sb-link .soon {
    margin-left: auto;
    font-size: 7.5px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    background: rgba(232,160,32,.12);
    color: var(--gold);
    border: 1px solid rgba(232,160,32,.25);
    border-radius: 3px;
    padding: 2px 5px;
  }
  .sb-div {
    height: 1px;
    background: var(--border);
    margin: 8px 14px;
  }

  /* ── Main ── */
  .main {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }
  .logo {
    width: 110px; height: 110px;
    border-radius: 22px;
    box-shadow: 0 12px 50px rgba(204,30,43,.3), 0 2px 10px rgba(0,0,0,.5);
    margin-bottom: 28px;
    animation: rise .7s cubic-bezier(.2,.8,.4,1) both;
  }
  .brand {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    text-transform: uppercase;
    line-height: .92;
    text-align: center;
    animation: rise .7s .1s cubic-bezier(.2,.8,.4,1) both;
  }
  .brand .r { font-size: clamp(48px,9vw,80px); color: var(--white); display: block; }
  .brand .t { font-size: clamp(48px,9vw,80px); color: var(--red); display: block; }

  .tagline {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 14px;
    animation: rise .7s .2s cubic-bezier(.2,.8,.4,1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
